name: Supabase Keep Alive

on:
  schedule:
    # Запуск кожні 24 години (рекомендую 24 замість 25 для стабільності)
    - cron: '0 0 * * *'
  workflow_dispatch: # Дозволяє запустити вручну для перевірки

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"